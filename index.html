<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabador de Acuerdos - El Libertador</title>
    <style>
        :root {
            --color-primario: #008B47; /* Verde Seguros Bolívar */
            --color-secundario: #FFD44D; /* Amarillo */
            --color-fondo: #f4f7f6;
            --color-texto: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        .contenedor {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 5px solid var(--color-primario);
        }

        h1 {
            color: var(--color-primario);
            margin-bottom: 5px;
        }

        .consentimiento {
            background-color: #fff8e1;
            border-left: 4px solid var(--color-secundario);
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            font-size: 0.9rem;
            border-radius: 4px;
        }

        .consentimiento label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
        }

        .controles {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #btnGrabar {
            background-color: var(--color-primario);
            color: white;
        }

        #btnGrabar:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #btnDetener {
            background-color: #e53935;
            color: white;
            display: none;
        }

        .tiempo {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--color-primario);
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }

        .lista-grabaciones {
            margin-top: 30px;
            text-align: left;
            width: 100%;
        }

        .item-grabacion {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #e0e0e0;
        }

        .btn-descargar {
            background-color: var(--color-secundario);
            color: #333;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .estado-grabando {
            color: #e53935;
            font-weight: bold;
            animation: parpadeo 1.5s infinite;
            display: none;
        }

        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Grabador de Acuerdos</h1>
        <p>Herramienta optimizada para Gemini</p>

        <div class="consentimiento">
            <label>
                <input type="checkbox" id="checkConsentimiento">
                <span><strong>Aviso Legal:</strong> Confirmo que he informado al cliente que esta llamada está siendo grabada para fines de calidad y transcripción de acuerdos comerciales.</span>
            </label>
        </div>

        <div class="estado-grabando" id="indicadorGrabando">🔴 Grabando...</div>
        <div class="tiempo" id="tiempo">00:00</div>

        <div class="controles">
            <button id="btnGrabar" disabled>🎙️ Iniciar Grabación</button>
            <button id="btnDetener">⏹️ Detener y Guardar</button>
        </div>

        <div class="lista-grabaciones" id="listaGrabaciones">
            </div>
    </div>

    <script>
        let mediaRecorder;
        let trozosAudio = [];
        let flujoMic;
        let intervaloTiempo;
        let segundos = 0;

        const btnGrabar = document.getElementById('btnGrabar');
        const btnDetener = document.getElementById('btnDetener');
        const checkConsentimiento = document.getElementById('checkConsentimiento');
        const displayTiempo = document.getElementById('tiempo');
        const indicadorGrabando = document.getElementById('indicadorGrabando');
        const listaGrabaciones = document.getElementById('listaGrabaciones');

        // Habilitar botón solo si hay consentimiento
        checkConsentimiento.addEventListener('change', function() {
            btnGrabar.disabled = !this.checked;
        });

        // Formatear el tiempo a MM:SS
        function formatearTiempo(segs) {
            const m = Math.floor(segs / 60).toString().padStart(2, '0');
            const s = (segs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Iniciar Grabación (VERSIÓN ULTRA LIGERA)
        btnGrabar.addEventListener('click', async () => {
            try {
                // Configuración para que pese muy poco: Mono (1 canal)
                flujoMic = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    } 
                });

                // Comprimir el audio a 16kbps (ideal para voz)
                const opciones = { audioBitsPerSecond: 16000 };
                mediaRecorder = new MediaRecorder(flujoMic, opciones);
                trozosAudio = [];

                mediaRecorder.ondataavailable = (evento) => {
                    if (evento.data.size > 0) {
                        trozosAudio.push(evento.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    // Se crea el archivo webm (mucho más liviano que mp3 y aceptado por Gemini)
                    const audioBlob = new Blob(trozosAudio, { type: 'audio/webm' });
                    crearElementoDescarga(audioBlob);
                    
                    // Apagar micrófono
                    flujoMic.getTracks().forEach(track => track.stop());
                    
                    // Reiniciar interfaz
                    clearInterval(intervaloTiempo);
                    segundos = 0;
                    displayTiempo.textContent = "00:00";
                    btnGrabar.style.display = 'inline-block';
                    btnDetener.style.display = 'none';
                    indicadorGrabando.style.display = 'none';
                    checkConsentimiento.checked = false;
                    btnGrabar.disabled = true;
                };

                mediaRecorder.start();
                
                // Cambiar interfaz
                btnGrabar.style.display = 'none';
                btnDetener.style.display = 'inline-block';
                indicadorGrabando.style.display = 'block';

                // Iniciar cronómetro
                intervaloTiempo = setInterval(() => {
                    segundos++;
                    displayTiempo.textContent = formatearTiempo(segundos);
                }, 1000);

            } catch (error) {
                alert("Error al acceder al micrófono. Por favor permite el acceso en tu navegador.");
                console.error(error);
            }
        });

        // Detener Grabación
        btnDetener.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        });

        // Crear la tarjeta de descarga
        function crearElementoDescarga(blob) {
            const url = URL.createObjectURL(blob);
            const fecha = new Date();
            const nombreArchivo = `Acuerdo_Comercial_${fecha.getDate()}-${fecha.getMonth()+1}_${fecha.getHours()}-${fecha.getMinutes()}.webm`;

            const item = document.createElement('div');
            item.className = 'item-grabacion';

            const titulo = document.createElement('strong');
            titulo.textContent = `Grabación finalizada (${formatearTiempo(segundos)})`;

            const audioEl = document.createElement('audio');
            audioEl.controls = true;
            audioEl.src = url;

            const linkDescarga = document.createElement('a');
            linkDescarga.href = url;
            linkDescarga.download = nombreArchivo;
            linkDescarga.className = 'btn-descargar';
            linkDescarga.textContent = '📥 Descargar Audio Ligero para Gemini';

            item.appendChild(titulo);
            item.appendChild(audioEl);
            item.appendChild(linkDescarga);

            listaGrabaciones.prepend(item);
        }
    </script>
</body>
</html>
